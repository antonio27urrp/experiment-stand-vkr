name: Deploy To Server

on:
  workflow_run:
    workflows: ["Publish Runtime Image"]
    types: [completed]
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            APP_IMAGE="${{ secrets.APP_IMAGE }}"
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            if [ -z "$APP_DIR" ]; then
              echo "SERVER_APP_DIR is empty. Set it in GitHub Secrets."
              exit 1
            fi
            if [ -z "$APP_IMAGE" ]; then
              echo "APP_IMAGE is empty. Set it in GitHub Secrets (example: ghcr.io/owner/experiment-stand-app:latest)."
              exit 1
            fi
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            if [ ! -d .git ]; then
              git init
              git remote add origin "https://github.com/${{ github.repository }}.git"
            fi
            git fetch --all
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            docker system df || true
            docker builder prune -af || true
            docker image prune -af || true
            docker container prune -f || true
            docker system df || true
            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            export VITE_REMOTE_MICRO_LIST_URL="http://${{ secrets.SERVER_HOST }}:5111/remoteEntry.js"
            export VITE_REMOTE_MICRO_DETAIL_URL="http://${{ secrets.SERVER_HOST }}:5112/remoteEntry.js"
            export VITE_REMOTE_MICRO_CRUD_URL="http://${{ secrets.SERVER_HOST }}:5113/remoteEntry.js"
            export APP_IMAGE="$APP_IMAGE"
            docker compose pull
            COMPOSE_PARALLEL_LIMIT=1 docker compose up -d --remove-orphans
            docker image prune -af
