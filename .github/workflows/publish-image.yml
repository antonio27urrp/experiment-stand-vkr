name: Publish Runtime Image

on:
  workflow_run:
    workflows: ["Benchmark CI/CD"]
    types: [completed]
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-runtime-image
  cancel-in-progress: true

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize repository owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/experiment-stand-app:latest
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/experiment-stand-app:${{ github.sha }}
